<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Play the demo | Invasion Of Zombies</title>
<meta name="description" content="Play Invasion Of Zombies in your browser — free, no install, no account. Multiply the crowd, outlast the horde.">
<meta name="theme-color" content="#0e0e10">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230e0e10'/%3E%3Ccircle cx='16' cy='13' r='6' fill='%237ee787'/%3E%3Ccircle cx='13.6' cy='12' r='1.4' fill='%230e0e10'/%3E%3Ccircle cx='18.4' cy='12' r='1.4' fill='%230e0e10'/%3E%3Cpath d='M11 24h10' stroke='%237ee787' stroke-width='2.4' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
:root{--bg:#0e0e10; --line:#2a2a2e; --text:#f0f0f2; --text-dim:#9a9aa0; --accent:#7ee787;}
*{margin:0; padding:0; box-sizing:border-box;}
html,body{height:100%; background:var(--bg); overflow:hidden;}
body{display:flex; flex-direction:column; font-family:'Outfit',system-ui,-apple-system,'Segoe UI',sans-serif;}
.bar{flex:0 0 44px; display:flex; align-items:center; gap:12px; padding:0 14px;
  background:rgba(14,14,16,.92); border-bottom:1px solid var(--line);}
.bar a.brand{font-size:13px; font-weight:800; letter-spacing:.08em; color:var(--text); text-decoration:none;}
.bar a.brand b{color:var(--accent);}
.bar .tag{font-size:10px; letter-spacing:.18em; color:var(--text-dim); border:1px solid var(--line);
  border-radius:3px; padding:2px 7px;}
.bar .home{margin-left:auto; font-size:12px; color:var(--text-dim); text-decoration:none;}
.bar .home:hover{color:var(--text);}
.stage{flex:1; position:relative;}
.stage iframe{position:absolute; inset:0; width:100%; height:100%; border:0;}
</style>
</head>
<body>
<div class="bar">
  <a class="brand" href="/">ZOMBIE<b> &#10005;</b></a>
  <span class="tag">BROWSER DEMO</span>
  <a class="home" href="/">&larr; Back to site</a>
</div>
<div class="stage">
  <iframe src="demo/index.html" title="Invasion Of Zombies" allow="autoplay; fullscreen"></iframe>
</div>
  <script data-goatcounter="https://invasionofzombies.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</body>
</html>
